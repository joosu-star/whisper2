<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispr Experimento</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="channel-general">
<header>
  <div id="tabs">
    <button class="tab" data-tab="trending">Tendencias</button>
    <button class="tab" data-tab="info">Info</button>
    <button class="tab" data-tab="fame">Salón de la Fama</button>
  </div>
  <div id="currentChannel"></div>
</header>

<section id="channels">
  <button class="channel-btn" data-channel="general">General</button>
  <button class="channel-btn" data-channel="profesores">Profesores</button>
  <button class="channel-btn" data-channel="experiencias">Experiencias</button>
  <button class="channel-btn" data-channel="quejas">Quejas</button>
</section>

<main id="content">
  <div id="trending" class="tab-content">Contenido Tendencias</div>
  <div id="info" class="tab-content">Info: tres recuadros originales...</div>
  <div id="fame" class="tab-content">Salón de la Fama: diseño distinto...</div>
</main>

<script src="app.js"></script>
</body>
</html>
